### 如何確保圖片長久顯示？
如果您發現以後連結又斷了，您有兩個選擇：
1. **替換連結**：重複您剛才的做法，去 Google Maps 找最新的圖片網址替換掉陣列中的連結。
2. **轉存圖片**：將那些景點照片下載並存到您 GitHub 專案的 `images/` 資料夾下，然後把程式碼中的 `img: "..."` 改成 `img: "images/bridge.jpg"` 這樣的路徑。這是最穩定、永久不會失效的做法。
